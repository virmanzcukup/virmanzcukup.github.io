<!DOCTYPE html>
<html>
<head>
 <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
        <meta name="viewport" content="width=device-width, initial-scale=0.86, maximum-scale=5.0, minimum-scale=0.86">

  <title>Logout</title>
  <link rel="stylesheet" href="">
</head>
<style>
  * {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Noto Sans SC', sans-serif;
    background-image: linear-gradient(to bottom, #000428, #004e92);"
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    background-color: #0002;
    background-blend-mode: multiply;
    padding: 25px;
}

:root {
    --default: #b9b69a;
    --success: #51be56;
    --warning: #ffc107;
    --danger: #ff5722;
    --primary: #29b6f6;
}

.alert {
    border: 1px outset var(--default);
    border-left-width: 5px;
    box-shadow: 0 4px 10px #0004, 0 2px 20px #0008;
    display: flex;
    align-items: center;
    padding: 15px 25px;
    margin-top: 250px ;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    background-image: linear-gradient(45deg, #ffffff2f, #ffffff10);
    transition-property: opacity, transform;
    transition: 0.5s ease-in;
}

.alert.close {
    opacity: 0;
    transform: translateY(40px);
}

.alert>.icon {
    min-width: 40px;
    min-height: 40px;
    background-color: var(--default);
    display: inline-block;
    border-radius: 50%;
    color: #fff;
    text-align: center;
}

.alert>.icon>* {
    line-height: 40px;
}

.alert>.text {
    width: 100%;
    padding: 0 15px;
    color: #fff;
}

.alert>.text p{
    margin: 5px 0;
    font-size: 14px;
}

.alert>.close{
    outline: none;
    border: none;
    background-color: transparent;
    font-size: 18px;
    color: #fff;
    cursor: pointer;
    transition: 0.3s ease-in-out;
}
.alert>.close:hover{
    color: red;
}


/* warning alert start */
.alert-warning{
    border-color: var(--warning);
}
.alert-warning>.icon{
    background-color: var(--warning);
}
/* warning alert end */

</style>

<body>
  

 <script language="JavaScript">

    function openLogin() {
  if (window.name != 'hotspot_logout') return true;
  open('$(link-login)', '_blank', '');
  window.close();
  return false;
    }

</script>
    
    <div class="alert alert-warning">
        <!-- <span class="icon"> -->
            <img src="img/err.svg" width="40">
        </span>
    
        <div class="text">
            <strong>$(username) Telah Logout</strong>
            <p>Terimkasih telah menggunakan layanan internet kami.</p>
        </div>
    
        <form action="$(link-login)" name="login" onSubmit="return openLogin()">
        <img src="img/off.svg" width="50">
        <input  type="submit" class="btn btn-warning mt-3" value="Logout"></a>
        </form>
        </form>
    
    </div>
    
  

    <script>
      let alert_close_icons = document.querySelectorAll('.alert>.close');
if (alert_close_icons) {
    alert_close_icons.forEach((alert_close_icon) => {
        alert_close_icon.addEventListener('click', function () {
            this.closest('.alert').classList.add('close');

            this.closest('.alert').addEventListener('transitionend', function (event) {
                if (event.propertyName == 'transform') {
                    this.remove();
                }
            });
        });
    });
}
</script>

<script type="text/javascript">
  document.getElementById('title').innerHTML = window.location.hostname + " > logout";
</script>

</body>
</html>
